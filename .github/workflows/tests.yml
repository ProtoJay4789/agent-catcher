name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scoring engine tests
        run: |
          python -m pytest agent/tests/test_scoring.py -v

      - name: Run E2E pipeline tests
        run: |
          python -m pytest agent/tests/test_e2e.py -v

      - name: Run alert system tests
        run: |
          python -m pytest agent/tests/test_alerts.py -v

      - name: Run integration tests
        run: |
          python -m pytest agent/tests/test_integration.py -v

  move-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui
        uses: mistakenly-curious/setup-sui@v1
        with:
          sui-version: "mainnet-v1.47.1"

      - name: Run Move contract tests
        working-directory: contracts
        run: |
          sui move test
